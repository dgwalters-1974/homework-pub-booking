flows:
  # ─────────────────────────────────────────────────────────────────
  # confirm_booking — the ONE flow this homework uses.
  #
  # Entry: programmatic. RasaStructuredHalf POSTs:
  #   {"sender": "...", "message": "/confirm_booking",
  #    "metadata": {"booking": {"venue_id": ..., "party_size": 6, ...}}}
  #
  # Rasa's CompactLLMCommandGenerator parses "/confirm_booking" and
  # emits a StartFlow(confirm_booking) command. The flow then runs
  # ActionValidateBooking, which:
  #   1. reads tracker.latest_message.metadata.booking (our booking data)
  #   2. sets each slot
  #   3. validates against rules (party_size <= 8, deposit <= £300)
  #   4. sets validation_error slot (either a reason or None)
  #   5. if valid, also sets booking_reference
  #
  # The rest of the flow branches on validation_error to utter the
  # right response.
  #
  # Why TWO flows (confirm_booking + resume_from_loop) but no request_research?
  #   The spec mentions three flows. We implement two and deliberately
  #   omit the third:
  #   - `confirm_booking` — first-attempt entry point. The bridge POSTs
  #     /confirm_booking when it has fresh booking data from the loop half.
  #   - `resume_from_loop` — re-entry point after the loop half has
  #     finished further research. Functionally identical to
  #     confirm_booking for now (same validation, same branching), but a
  #     distinct entry point lets the bridge distinguish "fresh attempt"
  #     from "resumed after research" without changing the flow logic.
  #     The two could diverge as the scenario grows (e.g. different
  #     telemetry, different timeouts, different escalation rules).
  #   - `request_research` is OMITTED. This is a *reverse handoff* —
  #     structured half asking the loop half to redo research with new
  #     constraints. That belongs in the bridge layer (Ex7), not Rasa.
  #     Rasa flows are forward dialog logic; the round-trip pattern
  #     crosses process boundaries and is best owned by the Python
  #     bridge code.
  #
  #   Note: in CALM, slots are populated programmatically via the
  #   `metadata.booking` field on the POST — there are no user-facing
  #   `collect:` steps because the homework never uses Rasa for
  #   user-typed input.
  # ─────────────────────────────────────────────────────────────────
  confirm_booking:
    description: >
      Confirm a pub booking after validating party size and deposit.
      Triggers when the user sends the programmatic command
      /confirm_booking with booking metadata.
    steps:
      - id: validate
        action: action_validate_booking
        next:
          - if: "slots.validation_error is not null"
            then: rejected
          - else: confirmed
      - id: rejected
        action: utter_booking_rejected
        next: END
      - id: confirmed
        action: utter_booking_confirmed
        next: END

  resume_from_loop:
    description: >
      Re-enter the structured half after the loop half hands off
      mid-scenario (e.g. after the loop did additional research in
      response to a previous rejection). Triggers when the bridge
      POSTs /resume_from_loop with booking metadata. Currently mirrors
      confirm_booking exactly — same validation, same branching — but
      kept as a distinct entry point so the bridge can signal intent
      ("first attempt" vs "resumed after research") without changing
      the flow logic. The two flows can diverge later if the scenario
      requires per-source behaviour.
    steps:
      - id: validate
        action: action_validate_booking
        next:
          - if: "slots.validation_error is not null"
            then: rejected
          - else: confirmed
      - id: rejected
        action: utter_booking_rejected
        next: END
      - id: confirmed
        action: utter_booking_confirmed
        next: END
